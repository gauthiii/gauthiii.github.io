    /* ============================================================
       21st.dev COMPONENT — SplineScene (lazy 3D via splinetool viewer)
    ============================================================ */
    function SplineScene({ scene, className }) {
      const ref = useRef(null);
      const [loaded, setLoaded] = useState(false);
      useEffect(() => {
        if (!window.__splineLoaded) {
          const s = document.createElement('script');
          s.type = 'module';
          s.src = 'https://unpkg.com/@splinetool/viewer@1.9.48/build/spline-viewer.js';
          document.head.appendChild(s);
          window.__splineLoaded = true;
        }
        const el = ref.current; if (!el) return;
        const onLoad = () => setLoaded(true);
        el.addEventListener('load', onLoad);
        const t = setTimeout(() => setLoaded(true), 4000);
        return () => { el.removeEventListener('load', onLoad); clearTimeout(t); };
      }, []);
      return (
        <div className={cn("relative w-full h-full", className)}>
          {!loaded && <div className="absolute inset-0 flex items-center justify-center"><span className="loader"></span></div>}
          <spline-viewer ref={ref} url={scene} style={{ width:'100%', height:'100%', display:'block' }}></spline-viewer>
        </div>
      );
    }

        width: 0.5 + i * 0.03,
      }));
      return (
        <div className="absolute inset-0 pointer-events-none">

            <title>Background Paths</title>

                animate={{ pathLength: 1, opacity: [0.3, 0.6, 0.3], pathOffset: [0, 1, 0] }}
                transition={{ duration: 20 + (path.id % 10), repeat: Infinity, ease: "linear" }} />
            ))}

      );
    }

    /* ============================================================
       21st.dev COMPONENT — ContainerScroll, adapted reveal.
       Demo title -> "Production LLM workflows." Inside -> real project shot.
    ============================================================ */
    function ContainerScroll({ titleComponent, children }) {
      const containerRef = useRef(null);
      const { scrollYProgress } = useScroll({ target: containerRef });
      const [isMobile, setIsMobile] = useState(false);
      useEffect(() => {
        const cm = () => setIsMobile(window.innerWidth <= 768);
        cm(); window.addEventListener("resize", cm);
        return () => window.removeEventListener("resize", cm);
      }, []);
      const scaleDims = isMobile ? [0.7, 0.9] : [1.05, 1];
      const rotate = useTransform(scrollYProgress, [0, 1], [20, 0]);
      const scale = useTransform(scrollYProgress, [0, 1], scaleDims);
      const translate = useTransform(scrollYProgress, [0, 1], [0, -100]);
      return (
        <div ref={containerRef} className="h-[58rem] md:h-[78rem] flex items-center justify-center relative p-2 md:p-20">
          <div className="py-10 md:py-32 w-full relative" style={{ perspective: "1000px" }}>
            <motion.div style={{ translateY: translate }} className="max-w-5xl mx-auto text-center">{titleComponent}</motion.div>
            <motion.div style={{ rotateX: rotate, scale, boxShadow:"0 0 #0000004d, 0 9px 20px #0000004a, 0 37px 37px #00000042, 0 84px 50px #00000026, 0 149px 60px #0000000a, 0 233px 65px #00000003" }}
              className="max-w-5xl -mt-12 mx-auto h-[28rem] md:h-[40rem] w-full border-4 border-[#6C6C6C] p-2 md:p-6 bg-[#171a28] rounded-[30px] shadow-2xl">
              <div className="h-full w-full overflow-hidden rounded-2xl bg-[#10121d] md:rounded-2xl md:p-2">{children}</div>
            </motion.div>
          </div>
        </div>
      );
    }

                    <p className="text-sm text-[#8d8495] leading-relaxed">{s.items.join(" · ")}</p>
                  </Card>
                </Reveal>
              ))}
            </div>
          </div>
        </section>
      );
    }

    /* ============================================================
       SECTION 02 — Selected work : CURVED HOLOGRAM WALL
       Iron-Man-style spatial display. All 15 project cards sit on a
       concave 5x3 arc (preserve-3d). They fly in & assemble on scroll,
       the whole field orbits with mouse parallax, and hovering a card
       pops it forward with full details while the rest dim.
    ============================================================ */
    const HOLO = { COLS: 5, ROWS: 3, R: 1250, ANG: 13, GAPY: 188, CARD_W: 230 };

    // resting 3D transform + assemble delay for card index i
    function holoLayout(i) {
      const { COLS, ROWS, R, ANG, GAPY } = HOLO;
      const col = i % COLS, row = Math.floor(i / COLS);
      const co = col - (COLS - 1) / 2;   // -2..2
      const ro = row - (ROWS - 1) / 2;   // -1..1
      const rad = (co * ANG * Math.PI) / 180;
      const x = Math.sin(rad) * R;
      const z = (1 - Math.cos(rad)) * R; // edges curve toward viewer (concave)
      const y = ro * GAPY;
      const ry = -co * ANG;              // each card angles to face center
      const rx = -ro * 4;                // gentle vertical dome
      const delay = (Math.abs(co) + Math.abs(ro)) * 0.09 + i * 0.012;
      return { x, y, z, ry, rx, delay };
    }

    function HoloCard({ p, i, total, assembled, hovered, setHovered }) {
      const L = holoLayout(i);
      const isHover = hovered === i;
      const isDim = hovered !== null && !isHover;
      return (
        <div
          className="absolute left-1/2 top-1/2"
          style={{
            transform: `translate(-50%,-50%) translate3d(${L.x}px, ${L.y}px, ${L.z}px) rotateY(${L.ry}deg) rotateX(${L.rx}deg)`,
            transformStyle: "preserve-3d",
            zIndex: isHover ? 60 : 1,
          }}
        >
          <motion.div
            onHoverStart={() => setHovered(i)}
            onHoverEnd={() => setHovered(null)}
            initial={false}
            animate={{
              opacity: assembled ? (isDim ? 0.25 : 1) : 0,
              z: assembled ? 0 : -700,
              scale: assembled ? 1 : 0.6,
            }}
            whileHover={{ z: 170, scale: 1.16 }}
            transition={{ duration: 0.7, delay: assembled ? L.delay : 0, ease: [0.22, 1, 0.36, 1] }}
            style={{ transformStyle: "preserve-3d", width: HOLO.CARD_W }}
            className={cn(
              "relative cursor-pointer overflow-hidden rounded-xl border bg-cobalt/[0.06] backdrop-blur-md transition-colors",
              isHover ? "border-cobalt shadow-[0_0_40px_rgba(79,140,255,.55)]" : "border-cobalt/35 shadow-[0_0_18px_rgba(79,140,255,.18)]"
            )}
          >
            {/* hologram scanlines */}
            <div className="pointer-events-none absolute inset-0 z-10 opacity-40"
              style={{ background: "repeating-linear-gradient(180deg, rgba(120,200,255,.10) 0 1px, transparent 1px 4px)" }} />
            <div className="relative h-24 w-full overflow-hidden bg-[#0a1020]">
              <img src={p.image} alt={p.title} draggable={false}
                className="pointer-events-none h-full w-full object-cover opacity-90" />
              <span className="mono absolute right-2 top-2 z-20 rounded bg-black/50 px-1.5 py-0.5 text-[10px] text-cobalt">{String(i+1).padStart(2,"0")}/{total}</span>
            </div>
            <div className="relative z-20 p-3">
              <div className="mb-1.5 flex flex-wrap gap-1">
                {p.tags.slice(0, 3).map((t) => (
                  <span key={t} className="mono rounded-full border border-cobalt/30 bg-cobalt/10 px-1.5 py-0.5 text-[9px] text-cobalt">{t}</span>
                ))}
              </div>
              <h3 className="text-[13px] font-semibold leading-snug text-[#eaf2ff]">{p.title}</h3>
              {/* details reveal on hover */}
              <div className={cn("overflow-hidden transition-all duration-300",
                isHover ? "mt-2 max-h-60 opacity-100" : "max-h-0 opacity-0")}>
                <p className="text-[11px] leading-relaxed text-[#9fb4d6]">{p.description}</p>
                <p className="mono mt-2 text-[10px] text-amber">{p.details}</p>
                <div className="mt-2 flex items-center gap-3 text-[#c4d4f0]">
                  <a href={p.repo} target="_blank" rel="noopener" aria-label="GitHub" className="hover:text-amber transition"><i className="fa-brands fa-github"></i></a>
                  {p.demo && <a href={p.demo} target="_blank" rel="noopener" aria-label="Live demo" className="hover:text-amber transition"><i className="fa-solid fa-arrow-up-right-from-square"></i></a>}
                  {p.video && <a href={p.video} target="_blank" rel="noopener" aria-label="Demo video" className="hover:text-amber transition"><i className="fa-brands fa-youtube"></i></a>}
                </div>
              </div>
            </div>
          </motion.div>
        </div>
      );
    }

    function Projects() {
      const secRef = useRef(null);
      const [assembled, setAssembled] = useState(false);
      const [hovered, setHovered] = useState(null);
      const [scale, setScale] = useState(1);

      // assemble once the field scrolls into view
      useEffect(() => {
        const el = secRef.current; if (!el) return;
        const o = new IntersectionObserver((entries) => {
          entries.forEach((en) => { if (en.isIntersecting) { setAssembled(true); o.disconnect(); } });
        }, { threshold: 0.25 });
        o.observe(el);
        return () => o.disconnect();
      }, []);

      // responsive scale so the ~1320px wall fits any viewport
      useEffect(() => {
        const f = () => setScale(Math.min(1, window.innerWidth / 1360));
        f(); window.addEventListener("resize", f);
        return () => window.removeEventListener("resize", f);
      }, []);

      // mouse parallax → spring-damped field rotation
      const mvX = useMotionValue(0), mvY = useMotionValue(0);
      const rotY = useSpring(mvX, { stiffness: 55, damping: 18 });
      const rotX = useSpring(mvY, { stiffness: 55, damping: 18 });
      const onMove = (e) => {
        const r = e.currentTarget.getBoundingClientRect();
        const px = (e.clientX - r.left) / r.width - 0.5;
        const py = (e.clientY - r.top) / r.height - 0.5;
        mvX.set(px * 26); mvY.set(-py * 15);
      };
      const onLeave = () => { mvX.set(0); mvY.set(0); setHovered(null); };

      return (
        <section id="projects" ref={secRef} className="py-28 border-t border-white/5 overflow-hidden">
          <SectionHead eyebrow="02 — Selected work" title="Applied AI, data, and automation work."
            lede="Agentic systems, RAG applications, and ML pipelines — built end to end and shipped. Move your mouse to orbit the field, hover a card to bring it forward." />
          <div className="flex justify-center" style={{ perspective: "1300px", perspectiveOrigin: "50% 45%" }}
            onMouseMove={onMove} onMouseLeave={onLeave}>
            <div style={{ transform: `scale(${scale})` }}>
              <motion.div
                style={{ rotateX: rotX, rotateY: rotY, transformStyle: "preserve-3d", width: 1320, height: 560 }}
                className="relative mx-auto">
                {PROJECTS.map((p, i) => (
                  <HoloCard key={i} p={p} i={i} total={PROJECTS.length}
                    assembled={assembled} hovered={hovered} setHovered={setHovered} />
                ))}
              </motion.div>
            </div>
          </div>
          <p className="mono mt-2 text-center text-[11px] tracking-[0.18em] uppercase text-[#8d8495]">
            <i className="fa-solid fa-hand-pointer"></i> hover to focus · move mouse to orbit
          </p>
        </section>
      );
    }

    /* ============================================================
       SECTION 03 — The path (experience timeline)
    ============================================================ */
    function Experience() {
      return (
        <section id="experience" className="py-28 border-t border-white/5">
          <SectionHead eyebrow="03 — The path" title="Professional work across AI and software systems."
            lede="Roles spanning AI engineering, software development, research support, and enterprise technology delivery." />
          <div className="max-w-3xl mx-auto px-6 space-y-5">
            {EXPERIENCES.map((e, i) => (
              <Reveal key={i} delay={i*0.04}>
                <Card className="p-6 hover:bg-surface/70 transition-colors">
                  <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-2">
                    <div>
                      <h3 className="text-lg font-semibold">{e.role} <span className="text-[#8d8495] font-normal">@ {e.company}</span></h3>
                      <p className="text-[#c4b9c7] mt-1 text-sm">{e.desc}</p>
                    </div>
                    <span className="mono text-xs text-[#8d8495] shrink-0">{e.dates}</span>
                  </div>
                </Card>
              </Reveal>
            ))}
          </div>
        </section>
      );
    }

    /* ============================================================
       SECTION — the cheeky "credits" beat from index.html
    ============================================================ */
    function Credits() {
      return (
        <section className="py-24 border-t border-white/5">
          <div className="max-w-5xl mx-auto px-6 grid md:grid-cols-3 gap-6">
            <Reveal>
              <Card className="p-6 h-full">
                <p className="mono text-xs tracking-[0.22em] uppercase text-amber mb-3">Academic credit</p>
                <p className="text-xl font-semibold">I have a Master's Degree from ASU.</p>
                <p className="text-[#8d8495] mt-2">Well… who doesn't?</p>
              </Card>
            </Reveal>
            <Reveal delay={0.06}>
              <Card className="p-6 h-full">
                <p className="mono text-xs tracking-[0.22em] uppercase text-amber mb-3">Recruiting credit</p>
                <p className="text-xl font-semibold">Google tried to offer me a $300k package. OpenAI tried to poach me for $600k. And I said no.</p>
              </Card>
            </Reveal>
            <Reveal delay={0.12}>
              <Card className="p-6 h-full flex flex-col justify-center bg-gradient-to-br from-ember/15 to-cobalt/10 border-amber/20">
                <p className="text-xl font-semibold">If you wanna buy more bullshit like that — let's talk.</p>
                <a href={`mailto:${PROFILE.email}`} className="mono text-sm text-amber mt-3 inline-flex items-center gap-2">Email me <span>→</span></a>
              </Card>
            </Reveal>
          </div>
        </section>
      );
    }

    /* ============================================================
       SECTION 04 — Contact (Spotlight)
    ============================================================ */
    function Contact() {
      return (
        <section id="contact" className="py-32 border-t border-white/5 relative overflow-hidden">
          <Spotlight className="top-0 left-1/2 -translate-x-1/2" fill="#ff6b45" />
          <Reveal className="max-w-2xl mx-auto px-6 text-center relative z-10">
            <p className="mono text-xs tracking-[0.28em] uppercase text-amber mb-3">04 — Let's talk</p>
            <h2 className="text-3xl md:text-5xl font-bold tracking-tight mb-4">Let's build something useful and reliable.</h2>
            <p className="text-[#c4b9c7] mb-9">Reach out for AI engineering, agentic workflows, full-stack product builds, or data products that need rigorous execution and a polished interface.</p>
            <div className="flex flex-wrap items-center justify-center gap-3">
              <a href={`mailto:${PROFILE.email}`} className="inline-flex items-center gap-2 px-6 py-3 rounded-full bg-amber text-[#130907] font-bold hover:brightness-110 transition"><i className="fa-solid fa-envelope"></i> {PROFILE.email}</a>
              <a href={PROFILE.github} target="_blank" rel="noopener" className="inline-flex items-center gap-2 px-6 py-3 rounded-full border border-white/15 hover:bg-white/5 transition"><i className="fa-brands fa-github"></i> GitHub</a>
              <a href={PROFILE.linkedin} target="_blank" rel="noopener" className="inline-flex items-center gap-2 px-6 py-3 rounded-full border border-white/15 hover:bg-white/5 transition"><i className="fa-brands fa-linkedin"></i> LinkedIn</a>
              <a href={PROFILE.resume} target="_blank" rel="noopener" className="inline-flex items-center gap-2 px-6 py-3 rounded-full border border-white/15 hover:bg-white/5 transition"><i className="fa-solid fa-file-arrow-down"></i> Résumé</a>
            </div>
          </Reveal>
        </section>
      );
    }

    /* ============================================================
       Header / Nav + scroll progress
    ============================================================ */
    function Header() {
      const { scrollYProgress } = useScroll();
      return (
        <>
          <motion.div className="fixed top-0 left-0 right-0 h-[3px] z-[120] origin-left bg-gradient-to-r from-ember via-amber to-cobalt"
            style={{ scaleX: scrollYProgress }} />
          <header className="fixed top-0 left-0 right-0 z-[110] flex items-center justify-between px-5 md:px-10 py-4" style={{ mixBlendMode:'difference' }}>
            <a href="#top" className="font-extrabold tracking-tight text-white">Gautham Vijayaraj</a>
            <nav className="hidden md:flex gap-6 mono text-[11px] tracking-[0.18em] uppercase text-white/85">
              <a href="#skills" className="hover:text-white">Skills</a>
              <a href="#projects" className="hover:text-white">Work</a>
              <a href="#experience" className="hover:text-white">Path</a>
              <a href="#contact" className="hover:text-white">Contact</a>
            </nav>
          </header>
        </>
      );
    }

    function Footer() {
      const yr = new Date().getFullYear();
      return (
        <footer className="py-10 border-t border-white/5 text-center">
          <p className="mono text-xs text-[#8d8495]">© {yr} Gautham Vijayaraj · Built different, on purpose. · <a href="index6.html" className="text-cobalt hover:text-amber">View the classic site →</a></p>
        </footer>
      );
    }

    /* ============================================================
       APP
    ============================================================ */
    function App() {
      return (
        <>
          <Header />
          <main className="bg-bg">
            <Hero />
            <ConvictionSpline />
            <WorkflowReveal />
            <Capabilities />
            <Projects />
            <Experience />
            <Credits />
            <Contact />
          </main>
          <Footer />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
